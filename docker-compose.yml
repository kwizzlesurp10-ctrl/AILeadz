services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clawwork
      POSTGRES_PASSWORD: clawwork_secret
      POSTGRES_DB: clawwork
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawwork"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://clawwork:clawwork_secret@postgres:5432/clawwork
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./livebench/data/agent_data:/app/livebench/data/agent_data

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file: .env
    environment:
      DATABASE_URL: postgresql://clawwork:clawwork_secret@postgres:5432/clawwork
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data:
